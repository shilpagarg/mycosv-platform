<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">MycoSV platform and core algorithm</title>
  <desc id="desc">A five-panel schematic showing the biological problem, the three-layer hierarchical pangenome architecture, the core structural-variant calling algorithm, the pangenome-only definition, and reference-free read validation.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .panel { fill: #ffffff; stroke: #c9d7e2; stroke-width: 1.5; rx: 18; }
      .panel-soft { fill: #f9fbfd; stroke: #c9d7e2; stroke-width: 1.25; rx: 14; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 38px; font-weight: 700; fill: #071923; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 20px; fill: #17384d; }
      .panel-letter { font-family: Arial, Helvetica, sans-serif; font-size: 27px; font-weight: 700; fill: #005ea8; }
      .panel-title { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #071923; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #071923; }
      .label-bold { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #071923; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #1d3443; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #314856; }
      .mono { font-family: "Courier New", Courier, monospace; font-size: 15px; fill: #071923; }
      .node-text { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; fill: #ffffff; }
      .axis { stroke: #6f7d86; stroke-width: 2.2; fill: none; }
      .dna { stroke: #071923; stroke-width: 5; fill: none; stroke-linecap: round; }
      .dna-muted { stroke: #9aa7af; stroke-width: 5; fill: none; stroke-linecap: round; }
      .dna-blue { stroke: #005ea8; stroke-width: 5.5; fill: none; stroke-linecap: round; }
      .dna-teal { stroke: #008272; stroke-width: 5.5; fill: none; stroke-linecap: round; }
      .dna-amber { stroke: #c77d00; stroke-width: 5.5; fill: none; stroke-linecap: round; }
      .dna-rose { stroke: #a83d68; stroke-width: 5.5; fill: none; stroke-linecap: round; }
      .thin { stroke-width: 2.2; }
      .arrow { stroke: #314856; stroke-width: 2.4; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .arrow-blue { stroke: #005ea8; stroke-width: 2.6; fill: none; marker-end: url(#arrow-blue); stroke-linecap: round; }
      .arrow-teal { stroke: #008272; stroke-width: 2.6; fill: none; marker-end: url(#arrow-teal); stroke-linecap: round; }
      .arrow-amber { stroke: #c77d00; stroke-width: 2.6; fill: none; marker-end: url(#arrow-amber); stroke-linecap: round; }
      .dash { stroke-dasharray: 7 7; }
      .muted-fill { fill: #edf2f5; }
      .blue-fill { fill: #e2f0fb; }
      .teal-fill { fill: #e0f3ef; }
      .amber-fill { fill: #fff0d1; }
      .rose-fill { fill: #f8e2eb; }
      .slate-fill { fill: #e8eef2; }
      .blue { fill: #005ea8; }
      .teal { fill: #008272; }
      .amber { fill: #c77d00; }
      .rose { fill: #a83d68; }
      .slate { fill: #314856; }
      .dark { fill: #071923; }
      .white { fill: #ffffff; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#314856"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#005ea8"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#008272"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c77d00"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#071923" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1200"/>

  <text class="title" x="72" y="76">MycoSV enables pangenome-layer discovery of fungal structural variation</text>
  <text class="subtitle" x="72" y="112">A tree-of-life index routes each query to clade graphs that expose reference-visible, pangenome-only and query-only variation</text>

  <!-- Panel a -->
  <rect class="panel" x="60" y="155" width="505" height="315" rx="18" filter="url(#shadow)"/>
  <text class="panel-letter" x="88" y="196">a</text>
  <text class="panel-title" x="124" y="196">Problem: hidden fungal variation</text>
  <text class="small" x="124" y="224">Mobile and accessory loci can be absent from the chosen reference.</text>

  <text class="label-bold" x="100" y="277">Single reference</text>
  <path class="dna-muted" d="M100 315 H480"/>
  <circle class="slate" cx="155" cy="315" r="8"/>
  <circle class="slate" cx="300" cy="315" r="8"/>
  <circle class="slate" cx="425" cy="315" r="8"/>
  <path class="arrow dash" d="M100 346 H480"/>
  <text class="tiny" x="168" y="365">novel sequence has no reference anchor</text>

  <text class="label-bold" x="100" y="405">Pangenome</text>
  <path class="dna-blue" d="M100 452 H218"/>
  <path class="dna-amber" d="M218 452 C244 420, 295 420, 321 452"/>
  <path class="dna-blue" d="M321 452 H480"/>
  <rect class="amber-fill" x="235" y="404" width="80" height="30" rx="8"/>
  <text class="tiny" x="247" y="424">HGT/TE</text>
  <rect class="panel-soft blue-fill" x="350" y="390" width="118" height="42" rx="10"/>
  <text class="label-bold" x="370" y="408">76.1%</text>
  <text class="tiny" x="366" y="426">pangenome-only</text>

  <!-- Panel b -->
  <rect class="panel" x="605" y="155" width="610" height="315" rx="18" filter="url(#shadow)"/>
  <text class="panel-letter" x="633" y="196">b</text>
  <text class="panel-title" x="669" y="196">Solution: hierarchical pangenome index</text>
  <text class="small" x="669" y="224">Scalable by routing before loading graphs and reusing cached indexes.</text>

  <rect class="panel-soft blue-fill" x="640" y="250" width="285" height="66" rx="14"/>
  <text class="label-bold" x="665" y="273">VP-tree router</text>
  <text class="tiny" x="665" y="294">rank clades from compact sketches</text>
  <text class="tiny" x="665" y="310">load only top candidate graphs</text>
  <rect class="panel-soft teal-fill" x="640" y="328" width="285" height="66" rx="14"/>
  <text class="label-bold" x="665" y="351">Bloom + LRU registry</text>
  <text class="tiny" x="665" y="372">skip absent clades; reuse hot graphs</text>
  <text class="tiny" x="665" y="388">manifest enables build-once/query-many</text>

  <path class="arrow-blue" d="M925 283 H940 V361 H928"/>
  <path class="arrow-teal" d="M925 361 H940 V437 H928"/>

  <g transform="translate(955 255)">
    <text class="label-bold" x="0" y="0">Pangenome search space</text>
    <line class="axis" x1="18" y1="37" x2="18" y2="190"/>
    <circle class="blue" cx="18" cy="37" r="10"/><text class="small" x="42" y="43">phylum</text>
    <circle class="teal" cx="18" cy="68" r="10"/><text class="small" x="42" y="74">class</text>
    <circle class="amber" cx="18" cy="99" r="10"/><text class="small" x="42" y="105">order</text>
    <circle class="rose" cx="18" cy="130" r="10"/><text class="small" x="42" y="136">family</text>
    <circle class="slate" cx="18" cy="161" r="10"/><text class="small" x="42" y="167">genus</text>
    <circle class="dark" cx="18" cy="192" r="10"/><text class="small" x="42" y="198">species</text>
  </g>
  <rect class="panel-soft amber-fill" x="640" y="404" width="285" height="66" rx="14"/>
  <text class="label-bold" x="665" y="427">Graph/Suffix-array caller</text>
  <text class="tiny" x="665" y="448">reuse suffix arrays across queries</text>
  <text class="tiny" x="665" y="464">call only routed clade loci</text>

  <!-- Panel c -->
  <rect class="panel" x="1255" y="155" width="485" height="315" rx="18" filter="url(#shadow)"/>
  <text class="panel-letter" x="1283" y="196">c</text>
  <text class="panel-title" x="1319" y="196">Pangenome query modes</text>
  <text class="small" x="1319" y="224">Assemblies and long reads are converted into graph-routed loci.</text>

  <rect class="panel-soft blue-fill" x="1315" y="265" width="155" height="58" rx="14"/>
  <text class="label-bold" x="1352" y="298">assembly</text>
  <rect class="panel-soft teal-fill" x="1525" y="265" width="155" height="58" rx="14"/>
  <text class="label-bold" x="1556" y="298">long reads</text>
  <path class="arrow-blue" d="M1392 323 C1408 354, 1440 370, 1485 378"/>
  <path class="arrow-teal" d="M1603 323 C1588 354, 1555 370, 1510 378"/>
  <rect class="panel-soft slate-fill" x="1374" y="378" width="285" height="70" rx="14"/>
  <text class="label-bold" x="1418" y="409">query loci</text>
  <text class="small" x="1405" y="433">route to pangenome graph layers</text>

  <!-- Panel d -->
  <rect class="panel" x="60" y="510" width="1110" height="610" rx="18" filter="url(#shadow)"/>
  <text class="panel-letter" x="88" y="552">d</text>
  <text class="panel-title" x="124" y="552">Pangenome-layer SV calling</text>
  <text class="small" x="124" y="580">Anchors choose clades; chain gaps, graph paths and non-anchored sequence become SV calls plus biology labels.</text>

  <g transform="translate(110 625)">
    <rect class="panel-soft blue-fill" x="0" y="0" width="180" height="82"/>
    <text class="label-bold" x="26" y="33">1. seed</text>
    <text class="small" x="26" y="58">syncmer/MEM anchors</text>
    <circle class="blue" cx="26" cy="110" r="8"/>
    <circle class="blue" cx="74" cy="110" r="8"/>
    <circle class="blue" cx="130" cy="110" r="8"/>
    <path class="dna-blue" d="M10 110 H165"/>
  </g>
  <path class="arrow-blue" d="M304 676 H386"/>
  <g transform="translate(400 625)">
    <rect class="panel-soft teal-fill" x="0" y="0" width="195" height="82"/>
    <text class="label-bold" x="25" y="33">2. chain/refine</text>
    <text class="small" x="25" y="58">score collinear anchors</text>
    <path class="dna-teal" d="M15 110 H170"/>
    <path class="axis thin" d="M25 132 L145 92"/>
    <circle class="teal" cx="25" cy="132" r="6"/>
    <circle class="teal" cx="70" cy="117" r="6"/>
    <circle class="teal" cx="145" cy="92" r="6"/>
  </g>
  <path class="arrow-teal" d="M610 676 H690"/>
  <g transform="translate(705 625)">
    <rect class="panel-soft amber-fill" x="0" y="0" width="200" height="82"/>
    <text class="label-bold" x="25" y="33">3. classify locus</text>
    <text class="small" x="25" y="58">chain gap / graph path</text>
    <path class="dna" d="M18 112 H70 C94 76, 132 76, 156 112 H182"/>
    <path class="dna-amber" d="M70 112 C96 148, 130 148, 156 112"/>
    <circle class="dark" cx="70" cy="112" r="7"/>
    <circle class="dark" cx="156" cy="112" r="7"/>
  </g>
  <path class="arrow-amber" d="M920 676 H1000"/>
  <g transform="translate(1015 625)">
    <rect class="panel-soft rose-fill" x="0" y="0" width="110" height="82"/>
    <text class="label-bold" x="19" y="33">4. call</text>
    <text class="small" x="20" y="58">SV + class</text>
    <rect class="rose" x="22" y="96" width="66" height="31" rx="8"/>
    <text class="node-text" x="36" y="117">VCF</text>
  </g>

  <g transform="translate(118 782)">
    <rect class="panel-soft blue-fill" x="0" y="0" width="975" height="48" rx="14"/>
    <text class="label-bold" x="26" y="31">Key distinction:</text>
    <text class="label" x="176" y="31">Scalability: sketch-route first, load few graphs, reuse caches, then call only routed loci.</text>
  </g>

  <g transform="translate(128 875)">
    <text class="label-bold" x="0" y="0">Concrete pangenome-only locus</text>
    <text class="tiny" x="0" y="24">Accessory cargo absent from one reference; present in a routed clade graph.</text>

    <text class="tiny" x="0" y="62">single reference</text>
    <path class="dna-muted" d="M120 58 H235"/>
    <path class="dna-muted" d="M330 58 H500"/>
    <path class="arrow dash" d="M235 58 H330"/>
    <text class="tiny" x="252" y="82">cargo absent</text>

    <text class="tiny" x="0" y="118">clade graph</text>
    <path class="dna-blue" d="M120 114 H225"/>
    <path class="dna-amber" d="M225 114 C250 76, 318 76, 343 114"/>
    <path class="dna-blue" d="M343 114 H500"/>
    <rect class="amber-fill" x="238" y="76" width="92" height="28" rx="8"/>
    <text class="tiny" x="253" y="95">cargo path</text>

    <text class="tiny" x="0" y="174">query locus</text>
    <path class="dna-blue" d="M120 170 H225"/>
    <path class="dna-amber" d="M225 170 C250 132, 318 132, 343 170"/>
    <path class="dna-blue" d="M343 170 H500"/>
    <rect class="panel-soft teal-fill" x="160" y="192" width="275" height="46" rx="10"/>
    <text class="tiny" x="206" y="211">reported: pangenome-only INS</text>
    <text class="tiny" x="224" y="229">HGT/Starship-class</text>
  </g>

  <g transform="translate(715 875)">
    <text class="label-bold" x="0" y="0">Classification outputs</text>
    <rect class="panel-soft" x="0" y="30" width="400" height="205"/>
    <rect class="blue" x="24" y="60" width="72" height="31" rx="8"/><text class="node-text" x="42" y="81">INS</text>
    <rect class="teal" x="110" y="60" width="72" height="31" rx="8"/><text class="node-text" x="128" y="81">DEL</text>
    <rect class="amber" x="196" y="60" width="72" height="31" rx="8"/><text class="node-text" x="214" y="81">INV</text>
    <rect class="rose" x="282" y="60" width="54" height="31" rx="8"/><text class="node-text" x="293" y="81">TRA</text>
    <text class="small" x="24" y="127">OFF_REF novelty</text>
    <path class="dna-blue" d="M165 121 H333"/>
    <text class="small" x="24" y="162">HGT/Starship</text>
    <text class="small" x="185" y="162">TE/repeat</text>
    <text class="small" x="295" y="162">RIP/TR</text>
    <path class="dna-amber" d="M24 192 H93"/>
    <path class="dna-rose" d="M185 192 H252"/>
    <path class="dna-teal" d="M295 192 H360"/>
  </g>

  <!-- Panel e -->
  <rect class="panel" x="1210" y="510" width="530" height="610" rx="18" filter="url(#shadow)"/>
  <text class="panel-letter" x="1238" y="552">e</text>
  <text class="panel-title" x="1274" y="552">Call scope and novelty</text>
  <text class="small" x="1274" y="580">The call-scope table records where each locus is represented.</text>

  <g transform="translate(1250 642)">
    <rect class="panel-soft slate-fill" x="0" y="0" width="430" height="78" rx="12"/>
    <text class="label-bold" x="20" y="23">single-reference-equivalent</text>
    <text class="tiny" x="20" y="43">same locus appears on benchmark reference</text>
    <path class="dna-muted" d="M318 50 H402"/>
    <circle class="slate" cx="360" cy="50" r="6"/>

    <rect class="panel-soft amber-fill" x="0" y="105" width="430" height="92" rx="12"/>
    <text class="label-bold" x="20" y="129">pangenome-only</text>
    <text class="tiny" x="20" y="151">absent from single reference</text>
    <text class="tiny" x="20" y="171">reported in the call-scope table</text>
    <path class="dna-blue" d="M308 165 H336"/>
    <path class="dna-amber" d="M336 165 C352 137, 384 137, 400 165"/>
    <path class="dna-blue" d="M400 165 H420"/>

    <rect class="panel-soft teal-fill" x="0" y="225" width="430" height="92" rx="12"/>
    <text class="label-bold" x="20" y="249">OFF_REF novelty</text>
    <text class="tiny" x="20" y="271">Path C: non-anchored query sequence</text>
    <text class="tiny" x="20" y="291">k-mer containment across references</text>
    <path class="dna-teal" d="M318 276 H410"/>

    <rect class="panel-soft blue-fill" x="0" y="350" width="430" height="78" rx="12"/>
    <text class="label-bold" x="20" y="376">reference-free support</text>
    <text class="tiny" x="20" y="396">raw reads validate query-derived junction windows</text>
    <text class="tiny" x="20" y="416">without using the benchmark reference</text>
  </g>

</svg>
